<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تفاصيل السجاف — موني للسجافات</title>
  <meta name="description" content="تفاصيل السجاف — صور، مميزات وخيارات الحجز.">
  <meta name="keywords" content="تفاصيل السجاف, سجاف, موني للسجافات">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root{ --gold:#b8860b; --white:#fff; --black:#0b0b0b; --muted:#333; --maxw:1100px; --radius:12px; }
    *{box-sizing:border-box}
    body{margin:0;font-family:'Tajawal',sans-serif;background:#fffaf6;color:var(--black)}
    header{background:var(--white);box-shadow:0 12px 40px rgba(0,0,0,0.04);position:sticky;top:0;z-index:1000}
    .wrap{max-width:var(--maxw);margin:auto;padding:12px 18px;display:flex;align-items:center;gap:12px}
    .logo{width:64px;height:64px;border-radius:10px;overflow:hidden}
    .title{color:var(--gold);font-weight:900}
    .container{max-width:var(--maxw);margin:20px auto;padding:18px}
    .hero{background:var(--white);border-radius:14px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,0.04)}
    .hero-main{width:100%;height:420px;border-radius:12px;overflow:hidden}
    .hero-main img{width:100%;height:100%;object-fit:cover}
    .thumbs{display:flex;gap:10px;margin-top:12px;overflow:auto}
    .thumbs img{width:110px;height:80px;object-fit:cover;border-radius:10px;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,0.04)}
    .details{display:flex;gap:20px;margin-top:20px;align-items:flex-start;flex-wrap:wrap}
    .info{flex:1;min-width:300px}
    .info h1{color:var(--gold);font-weight:900;margin:6px 0;font-size:28px}
    .info p{color:var(--black);line-height:1.7;font-weight:700}
    .features{margin-top:12px}
    .features li{margin:8px 0;list-style:none;padding:8px 12px;border-radius:10px;background:linear-gradient(90deg,rgba(184,134,11,0.06),transparent);font-weight:900;color:var(--gold)}
    .cta{display:flex;gap:12px;margin-top:18px}
    .btn{padding:12px 16px;border-radius:12px;border:0;cursor:pointer;font-weight:900}
    .btn.back{background:#fff;border:2px solid rgba(0,0,0,0.06)}
    .btn.book{background:var(--gold);color:#fff}
    @media(max-width:880px){
      .hero-main{height:280px}
      .thumbs img{width:88px;height:68px}
      .info h1{font-size:22px}
    }
    /* modal */
    .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:2000}
    .modal{width:95%;max-width:520px;background:var(--white);padding:18px;border-radius:12px;box-shadow:0 36px 90px rgba(0,0,0,0.28);position:relative}
    .modal .close{position:absolute;left:12px;top:12px;border:0;background:transparent;font-size:20px;cursor:pointer}
    .contact-btn{display:inline-flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;background:#fff;font-weight:900;box-shadow:0 10px 30px rgba(0,0,0,0.04)}
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <a href="index.html" class="logo"><img src="assets/logo.png" alt="logo"></a>
      <div style="flex:1">
        <div class="title">موني للسجافات</div>
        <div style="color:var(--muted);font-weight:700">تفاصيل السجاف</div>
      </div>
      <nav style="display:flex;gap:12px;align-items:center">
        <a href="index.html" style="color:var(--gold);font-weight:900">الرئيسية</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero" id="detailHero">
      <div class="hero-main" id="heroMain"><img src="" alt="الصورة الرئيسية"></div>
      <div class="thumbs" id="thumbs"></div>

      <div class="details">
        <div class="info">
          <h1 id="itemTitle">-</h1>
          <div style="font-weight:800;color:#777;margin-bottom:8px">الرمز: <span id="itemCode">-</span></div>
          <p id="itemDesc">-</p>

          <ul class="features" id="featuresList"></ul>

          <div class="cta">
            <button class="btn back" id="backToGallery">← الرجوع لمعرض السجافات</button>
            <button class="btn book" id="bookNow">حجز الآن</button>
          </div>
        </div>

        <aside style="min-width:260px">
          <div style="background:#fff;border-radius:12px;padding:12px;box-shadow:0 16px 40px rgba(0,0,0,0.04)">
            <div style="font-weight:900;color:var(--gold)">تفاصيل سريعة</div>
            <div style="margin-top:12px;color:var(--muted)"><strong>النوع:</strong> <span id="itemType"></span></div>
            <div style="margin-top:8px;color:var(--muted)"><strong>اللون:</strong> <span id="itemColor"></span></div>
            <div style="margin-top:8px;color:var(--muted)"><strong>الستايل:</strong> <span id="itemStyle"></span></div>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <!-- modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <button class="close" id="modalClose">✕</button>
      <h3 style="margin:0 0 8px;color:var(--gold);font-weight:900">حجز — <span id="modalItemTitle" style="color:var(--black)"></span></h3>
      <p style="color:var(--black);font-weight:700">اختر وسيلة للتواصل</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
        <button class="contact-btn" id="m_wa1" style="background:linear-gradient(180deg,var(--gold),#c68b0a);color:#fff">واتساب 1</button>
        <button class="contact-btn" id="m_wa2" style="background:#333;color:#fff">واتساب 2</button>
        <a class="contact-btn" id="m_fb" style="background:#1877f2;color:#fff" target="_blank">فيسبوك</a>
        <a class="contact-btn" id="m_in" style="background:linear-gradient(45deg,#f09433,#bc1888);color:#fff" target="_blank">انستغرام</a>
      </div>
    </div>
  </div>

  <script>
    // details.js
    function qs(name){ const u = new URL(location.href); return u.searchParams.get(name); }
    const id = Number(qs('id'));
    if(!id){ alert('لم يتم تحديد السجاف'); location.href = 'index.html'; }

    const heroMainImg = document.querySelector('#heroMain img');
    const thumbs = document.getElementById('thumbs');
    const itemTitle = document.getElementById('itemTitle');
    const itemDesc = document.getElementById('itemDesc');
    const featuresList = document.getElementById('featuresList');
    const itemType = document.getElementById('itemType');
    const itemColor = document.getElementById('itemColor');
    const itemStyle = document.getElementById('itemStyle');
    const backToGallery = document.getElementById('backToGallery');
    const bookNow = document.getElementById('bookNow');

    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalClose = document.getElementById('modalClose');
    const modalItemTitle = document.getElementById('modalItemTitle');
    const m_wa1 = document.getElementById('m_wa1');
    const m_wa2 = document.getElementById('m_wa2');
    const m_fb = document.getElementById('m_fb');
    const m_in = document.getElementById('m_in');

    fetch('data/sajafat.json').then(r=>r.json()).then(list=>{
      const it = list.find(x=>x.id === id);
      if(!it){ alert('السجاف غير موجود'); location.href='index.html'; return; }

      heroMainImg.src = it.gallery && it.gallery.length ? it.gallery[0] : it.image;
      itemTitle.textContent = it.name;
      itemDesc.textContent = it.description;
      itemType.textContent = it.type || '-';
      itemColor.textContent = it.color || '-';
      itemStyle.textContent = it.style || '-';

      featuresList.innerHTML = '';
      (it.features || []).forEach(f=>{
        const li = document.createElement('li'); li.textContent = '✅  ' + f; featuresList.appendChild(li);
      });

      thumbs.innerHTML = '';
      (it.gallery || []).forEach(src=>{
        const img = document.createElement('img'); img.src = src; img.alt = 'thumb';
        img.addEventListener('click', ()=> heroMainImg.src = src);
        thumbs.appendChild(img);
      });

      modalItemTitle.textContent = it.name;
      document.getElementById('itemCode').textContent = it.code || `SJ-${String(it.id).padStart(3,'0')}`;
      m_fb.href = it.facebook || 'https://www.facebook.com/ezaxy.store';
      m_in.href = it.instagram || 'https://www.instagram.com/ezaxy.store';
      m_wa1.addEventListener('click', ()=> window.open(`https://wa.me/+967766202116?text=${encodeURIComponent('مرحباً، أريد حجز: ' + it.name + ' (الرمز: ' + (it.code || 'SJ-'+String(it.id).padStart(3,'0')) + ')')}`,'_blank'));
      m_wa2.addEventListener('click', ()=> window.open(`https://wa.me/+967766202116?text=${encodeURIComponent('مرحباً، أريد حجز: ' + it.name + ' (الرمز: ' + (it.code || 'SJ-'+String(it.id).padStart(3,'0')) + ')')}`,'_blank'));
    }).catch(err=>{ console.error(err); alert('فشل تحميل البيانات'); location.href='index.html' });

    backToGallery.addEventListener('click', ()=> location.href='index.html');
    bookNow.addEventListener('click', ()=> modalBackdrop.style.display = 'flex');
    modalClose.addEventListener('click', ()=> modalBackdrop.style.display = 'none');
    modalBackdrop.addEventListener('click', e=> { if(e.target === modalBackdrop) modalBackdrop.style.display = 'none' });
    document.addEventListener('keydown', e=>{ if(e.key === 'Escape') modalBackdrop.style.display = 'none' });
  </script>
</body>
</html>
